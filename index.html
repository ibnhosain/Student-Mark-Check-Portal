<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS Data Types</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="main">
    <div class="body_color">
      <div class="form_padding">
        <h1>Student Portal</h1>
        <p>Name:</p>
        <input id="Stu_name"></input>
        <p>Age:</p>
        <input id="Stu_age"></input>
        <p>Marks:</p>
        <input id="Stu_marks"></input>
        <button type="button" class="submit_btn" onclick="showResult()">Check Result</button>
      </div>
    </div>
    <!-- 2nd portal -->
    <div class="body_2">
      <div class="form_padding" id="portal_2nd">
        <p id="Stu_name_show"></p>
        <p id="Stu_age_show"></p>
        <p id="Stu_marks_show"></p>
        <p id="Stu_grade_show"></p>
      </div>
    </div>
  </main>

  <script src="./app.js"></script>
</body>

</html>
